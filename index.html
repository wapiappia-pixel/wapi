<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pare y Coma — Pedido Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --brand:#E8430A;--brand-light:#FFF3EF;
  --wapi-dark:#2A8F40;
  --bg:#FAF9F7;--surface:#FFFFFF;--surface2:#F4F3F0;
  --border:#E8E6E1;--text:#1A1917;--muted:#6B6860;--hint:#A8A69F;
  --radius:14px;--radius-sm:8px;--wsp:#25D366;
}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding-bottom:6rem;}
.app{max-width:480px;margin:0 auto;padding:0 16px;}

/* Header */
.header{background:var(--brand);color:#fff;padding:1.5rem 1.25rem 1.25rem;border-radius:0 0 var(--radius) var(--radius);margin-bottom:1.5rem;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.07);}
.header::after{content:'';position:absolute;left:-20px;bottom:-40px;width:120px;height:120px;border-radius:50%;background:rgba(0,0,0,0.07);}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;position:relative;z-index:1;}
.header-badge{font-size:11px;font-weight:700;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:99px;letter-spacing:0.4px;}
.header-status{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;opacity:0.9;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,0.3);}
.header h1{font-size:26px;font-weight:900;line-height:1.1;position:relative;z-index:1;}
.header-sub{font-size:13px;font-weight:500;opacity:0.8;margin-top:4px;position:relative;z-index:1;}

.header-logo-wrap{display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.header-logo-name{font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;color:#fff;line-height:1.1;}
.header-badge{font-size:10px;font-weight:700;background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:99px;letter-spacing:0.4px;color:#fff;display:inline-block;margin-top:3px;}

/* Category tabs */
.cat-scroll{overflow-x:auto;margin-bottom:1.25rem;padding-bottom:4px;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-tabs{display:flex;gap:8px;width:max-content;}
.cat-tab{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;padding:7px 16px;border-radius:99px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.cat-tab:hover{border-color:var(--brand);color:var(--brand);}
.cat-tab.active{background:var(--brand);border-color:var(--brand);color:#fff;}

/* Section title */
.section-title{font-size:11px;font-weight:800;color:var(--hint);text-transform:uppercase;letter-spacing:1px;margin:1.5rem 0 0.75rem;}

/* Category group */
.cat-group{display:none;}
.cat-group.visible{display:block;}
.cat-group-title{font-size:14px;font-weight:800;color:var(--muted);margin:1.25rem 0 0.6rem;padding-left:2px;}

/* Product cards */
.product-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.product-card:hover{border-color:var(--brand);box-shadow:0 2px 12px rgba(232,67,10,0.08);}
.product-card.selected{border-color:var(--brand);background:var(--brand-light);}
.product-badge{display:inline-block;font-size:10px;font-weight:800;background:#FEF3C7;color:#92400E;border-radius:6px;padding:3px 8px;margin-left:6px;vertical-align:middle;}
.product-badge.new{background:#DCFCE7;color:#166534;}
.product-body{padding:0;}
.product-row{display:flex;align-items:center;gap:14px;}
.product-emoji-wrap{
  width:60px;height:60px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;background:var(--surface2);
}
.product-card.selected .product-emoji-wrap{background:rgba(232,67,10,0.08);}
.product-info{flex:1;min-width:0;}
.product-name{font-weight:800;font-size:15px;color:var(--text);}
.product-desc{font-size:12px;font-weight:500;color:var(--muted);margin-top:3px;line-height:1.4;}
.product-price{font-weight:800;font-size:15px;color:var(--brand);flex-shrink:0;align-self:flex-start;}

.qty-control{display:flex;align-items:center;gap:10px;margin-top:12px;}
.qty-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--brand);background:transparent;color:var(--brand);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1;transition:all 0.12s;}
.qty-btn:hover{background:var(--brand);color:#fff;}
.qty-num{font-weight:800;font-size:16px;min-width:22px;text-align:center;}
.qty-label{font-size:12px;font-weight:500;color:var(--muted);}

.extras-panel{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.extras-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px;}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px;}
.tag{font-size:12px;font-weight:600;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:all 0.12s;user-select:none;}
.tag:hover{border-color:var(--brand);}
.tag.on-add{background:var(--brand);color:#fff;border-color:var(--brand);}
.tag.on-remove{background:#fef2f2;color:#b91c1c;border-color:#fca5a5;}

/* Form */
.form-group{margin-bottom:12px;}
.form-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;}
.form-input,.form-textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:14px;font-family:'Nunito',sans-serif;font-weight:500;transition:border-color 0.15s;outline:none;}
.form-input:focus,.form-textarea:focus{border-color:var(--brand);}
.form-textarea{resize:none;min-height:72px;line-height:1.5;}

/* Summary */
.order-summary{background:var(--surface2);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;}
.summary-item{display:flex;justify-content:space-between;align-items:flex-start;font-size:14px;font-weight:500;color:var(--text);padding:4px 0;gap:8px;}
.summary-item-name{flex:1;}
.summary-item-mods{font-size:11px;font-weight:500;color:var(--muted);margin-top:2px;}
.summary-price{font-weight:700;flex-shrink:0;}
.summary-total{display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:17px;border-top:1px solid var(--border);margin-top:8px;padding-top:10px;}
.summary-total span:last-child{color:var(--brand);}
.cart-empty{text-align:center;color:var(--hint);font-size:13px;font-weight:500;padding:4px 0;}

/* Send button */
.btn-wsp{width:100%;padding:15px;background:var(--wsp);color:#fff;border:none;border-radius:var(--radius);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:background 0.15s,transform 0.1s;}
.btn-wsp:hover{background:#1ebe5a;}
.btn-wsp:active{transform:scale(0.98);}

/* Floating cart button */
.float-btn-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;z-index:100;
  background:var(--surface);
  border-top:1px solid var(--border);
  padding:12px 16px 20px;
}
.float-cart-btn{
  width:100%;padding:15px 20px;
  background:#C8C8C8;color:#fff;
  border:none;border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:not-allowed;display:flex;align-items:center;justify-content:space-between;
  transition:background 0.3s,box-shadow 0.3s,cursor 0.1s;
}
.float-cart-btn.active{
  background:var(--wsp);cursor:pointer;
  box-shadow:0 4px 16px rgba(37,211,102,0.3);
}
.float-cart-btn.active:hover{background:#1ebe5a;}
.float-cart-btn.active:active{transform:scale(0.98);}
.float-btn-left{display:flex;align-items:center;gap:10px;}
.float-btn-badge{
  background:rgba(255,255,255,0.3);border-radius:99px;
  padding:2px 10px;font-size:12px;font-weight:800;
}
.float-btn-label{font-size:15px;font-weight:800;}
.float-btn-total{font-size:15px;font-weight:800;}

/* Modal overlay */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity 0.25s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}

/* Modal sheet */
.modal-sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:480px;
  background:var(--bg);
  border-radius:20px 20px 0 0;
  padding:0 0 32px;
  z-index:201;
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh;overflow-y:auto;
}
.modal-sheet.open{transform:translateX(-50%) translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0;}

/* Modal header bar */
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;top:0;z-index:1;
}
.modal-title{font-size:16px;font-weight:900;color:var(--text);display:flex;align-items:center;gap:8px;}
.modal-close{
  width:30px;height:30px;border-radius:50%;
  border:none;background:var(--surface2);
  color:var(--muted);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-weight:400;line-height:1;
}
.modal-close:hover{background:var(--border);}

/* Modal summary box */
.modal-summary-box{
  background:var(--brand-light);
  border:1px solid rgba(232,67,10,0.15);
  border-radius:var(--radius);
  padding:12px 14px;
  margin:14px 16px 0;
}
.modal-summary-label{font-size:10px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.modal-summary-item{display:flex;justify-content:space-between;align-items:flex-start;font-size:13px;font-weight:600;padding:4px 0;gap:8px;color:var(--text);}
.modal-summary-mods{font-size:11px;font-weight:500;color:var(--muted);margin-top:2px;}
.modal-summary-total{
  display:flex;justify-content:space-between;align-items:center;
  font-weight:800;font-size:15px;
  border-top:1px solid rgba(232,67,10,0.2);
  margin-top:6px;padding-top:10px;
}
.modal-summary-total span:first-child{color:var(--text);}
.modal-summary-total span:last-child{color:var(--brand);}

/* Modal form area */
.modal-form{padding:14px 16px 0;}
.modal-form-row{display:flex;gap:10px;}
.modal-form-row .form-group{flex:1;}

/* Modal send button */
.modal-send-btn{
  margin:16px 16px 0;
  width:calc(100% - 32px);
  padding:15px;background:var(--wsp);color:#fff;
  border:none;border-radius:var(--radius);
  font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  transition:background 0.15s,transform 0.1s;
}
.modal-send-btn:hover{background:#1ebe5a;}
.modal-send-btn:active{transform:scale(0.98);}

/* Footer */
.footer-wapi{margin-top:2.25rem;padding-top:1rem;border-top:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px;}
.powered-label{font-size:12px;font-weight:600;color:var(--hint);}
.footer-sep{font-size:14px;color:var(--border);}
.wapi-name{font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;color:var(--wapi-dark);}
.wapi-ig{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--hint);text-decoration:none;transition:color 0.15s;}
.wapi-ig:hover{color:#E1306C;}

@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.product-card{animation:fadeSlideIn 0.2s ease both;}
</style>
</head>

        { id:'s1', emoji:'🥪', nombre:'Lomito clasico', precio:3500, desc:'Lomo de cerdo, tomate, palta, mayonesa',
          extras:['Queso','Cebolla caramelizada','Champinones'], removes:['Tomate','Palta','Mayonesa'], badge:'', badgeType:'' },
        { id:'s2', emoji:'🥪', nombre:'Lomito especial', precio:4200, desc:'Lomo de cerdo, queso, tocino, tomate, palta',
          extras:['Huevo frito','Cebolla caramelizada'], removes:['Tomate','Palta','Queso'], badge:'Popular', badgeType:'' },
        { id:'s3', emoji:'🥩', nombre:'Barros Luco', precio:3800, desc:'Carne y queso derretido',
          extras:['Tomate','Palta','Mayonesa','Aji'], removes:[], badge:'', badgeType:'' },
        { id:'s4', emoji:'🍖', nombre:'Barros Jarpa', precio:3600, desc:'Jamon y queso derretido',
          extras:['Tomate','Palta','Mayonesa'], removes:[], badge:'', badgeType:'' },
      ]}
    ]
  },
  papas: {
    grupos: [
      { titulo: 'Elige tu tamano', items: [
        { id:'p1', emoji:'🍟', nombre:'Papas fritas chicas', precio:1200, desc:'Porcion individual',
          extras:['Ketchup','Mayonesa','Aji'], removes:[], badge:'', badgeType:'' },
        { id:'p2', emoji:'🍟', nombre:'Papas fritas medianas', precio:1800, desc:'Porcion mediana con sal',
          extras:['Ketchup','Mayonesa','Aji','Queso cheddar'], removes:[], badge:'Popular', badgeType:'' },
        { id:'p3', emoji:'🍟', nombre:'Papas fritas grandes', precio:2500, desc:'Porcion familiar',
          extras:['Ketchup','Mayonesa','Aji','Queso cheddar','Tocino'], removes:[], badge:'', badgeType:'' },
        { id:'p4', emoji:'🧀', nombre:'Papas cargadas', precio:3200, desc:'Papas grandes con queso cheddar y tocino',
          extras:['Crema agria','Cebollino','Aji'], removes:['Queso','Tocino'], badge:'Nuevo', badgeType:'new' },
      ]}
    ]
  },
  bebidas: {
    grupos: [
      { titulo: 'Para acompanar', items: [
        { id:'b1', emoji:'🥤', nombre:'Bebida lata 350ml', precio:900, desc:'Coca-Cola, Sprite, Fanta o Kem',
          extras:[], removes:[], badge:'', badgeType:'' },
        { id:'b2', emoji:'🥤', nombre:'Bebida botella 500ml', precio:1300, desc:'Coca-Cola, Sprite o Fanta',
          extras:[], removes:[], badge:'', badgeType:'' },
        { id:'b3', emoji:'🍊', nombre:'Jugo natural', precio:1500, desc:'Naranja, manzana o pina',
          extras:[], removes:[], badge:'', badgeType:'' },
        { id:'b4', emoji:'💧', nombre:'Agua mineral 500ml', precio:800, desc:'Con o sin gas',
          extras:['Con gas','Sin gas'], removes:[], badge:'', badgeType:'' },
      ]}
    ]
  }
};

let cart = {};

const allItems = () => Object.values(CATEGORIAS).flatMap(c => c.grupos.flatMap(g => g.items));

function buildMenus() {
  Object.entries(CATEGORIAS).forEach(([catId, cat]) => {
    const container = document.getElementById('cat-' + catId);
    cat.grupos.forEach(grupo => {
      const titleEl = document.createElement('div');
      titleEl.className = 'cat-group-title';
      titleEl.textContent = grupo.titulo;
      container.appendChild(titleEl);
      grupo.items.forEach(p => {
        const wrap = document.createElement('div');
        wrap.id = 'card-' + p.id;
        container.appendChild(wrap);
      });
    });
  });
}

function renderCards() {
  allItems().forEach(p => {
    const wrap = document.getElementById('card-' + p.id);
    if (!wrap) return;
    const item = cart[p.id] || { qty:0, extras:[], removes:[] };
    const sel = item.qty > 0;

    let ext = '';
    if (sel && (p.extras.length || p.removes.length)) {
      ext = '<div class="extras-panel">';
      if (p.extras.length) {
        ext += '<div class="extras-label">Agregar</div><div class="tags">';
        p.extras.forEach(e => { ext += `<span class="tag${item.extras.includes(e)?' on-add':''}" data-pid="${p.id}" data-type="extra" data-val="${e}">${e}</span>`; });
        ext += '</div>';
      }
      if (p.removes.length) {
        ext += '<div class="extras-label" style="margin-top:10px;">Quitar</div><div class="tags">';
        p.removes.forEach(r => { ext += `<span class="tag${item.removes.includes(r)?' on-remove':''}" data-pid="${p.id}" data-type="remove" data-val="${r}">${r}</span>`; });
        ext += '</div>';
      }
      ext += '</div>';
    }

    const card = document.createElement('div');
    card.className = 'product-card' + (sel ? ' selected' : '');
    card.innerHTML = `
      <div class="product-body">
        <div class="product-row">
          <div class="product-emoji-wrap">${p.emoji}</div>
          <div class="product-info">
            <div class="product-name">${p.nombre}${p.badge ? `<span class="product-badge${p.badgeType==='new'?' new':''}">${p.badge}</span>` : ''}</div>
            <div class="product-desc">${p.desc}</div>
          </div>
          <div class="product-price">$${p.precio.toLocaleString('es-CL')}</div>
        </div>
        ${sel ? `<div class="qty-control">
          <button class="qty-btn" data-pid="${p.id}" data-delta="-1">-</button>
          <span class="qty-num">${item.qty}</span>
          <button class="qty-btn" data-pid="${p.id}" data-delta="1">+</button>
          <span class="qty-label">unidades</span>
        </div>` : ''}
        ${ext}
      </div>
    `;

    if (!sel) card.addEventListener('click', () => addItem(p.id));
    wrap.innerHTML = '';
    wrap.appendChild(card);

    wrap.querySelectorAll('.qty-btn').forEach(b => {
      b.addEventListener('click', e => { e.stopPropagation(); changeQty(b.dataset.pid, parseInt(b.dataset.delta)); });
    });
    wrap.querySelectorAll('.tag').forEach(t => {
      t.addEventListener('click', e => { e.stopPropagation(); toggleTag(t.dataset.pid, t.dataset.type, t.dataset.val); });
    });
  });
  renderSummary();
}

function addItem(id) {
  if (!cart[id]) cart[id] = { qty:1, extras:[], removes:[] };
  else cart[id].qty++;
  renderCards();
}
function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if (cart[id].qty === 0) delete cart[id];
  renderCards();
}
function toggleTag(id, type, val) {
  const item = cart[id]; if (!item) return;
  const arr = type === 'extra' ? item.extras : item.removes;
  const i = arr.indexOf(val);
  if (i >= 0) arr.splice(i, 1); else arr.push(val);
  renderCards();
}

function renderSummary() {
  const keys = Object.keys(cart);
  const floatBtn = document.getElementById('float-btn');
  const floatCount = document.getElementById('float-count');
  const floatTotal = document.getElementById('float-total');
  const floatLabel = document.getElementById('float-label');
  const modalResumen = document.getElementById('modal-resumen');

  if (!keys.length) {
    floatBtn.classList.remove('active');
    floatCount.style.display = 'none';
    floatLabel.textContent = 'Agrega un producto';
    floatTotal.textContent = '';
    if (modalResumen) modalResumen.innerHTML = '';
    return;
  }

  let total = 0, totalQty = 0, html = '';
  keys.forEach(id => {
    const p = allItems().find(x => x.id === id); if (!p) return;
    const item = cart[id];
    const sub = p.precio * item.qty;
    total += sub; totalQty += item.qty;
    let mods = [];
    if (item.extras.length) mods.push('+ ' + item.extras.join(', '));
    if (item.removes.length) mods.push('- sin ' + item.removes.join(', '));
    html += `<div class="modal-summary-item">
      <div>
        <div>${item.qty}x ${p.nombre}</div>
        ${mods.length ? `<div class="modal-summary-mods">${mods.join(' | ')}</div>` : ''}
      </div>
      <div style="font-weight:700;flex-shrink:0;color:var(--text)">$${sub.toLocaleString('es-CL')}</div>
    </div>`;
  });
  html += `<div class="modal-summary-total"><span>Total del pedido</span><span>$${total.toLocaleString('es-CL')}</span></div>`;

  if (modalResumen) modalResumen.innerHTML = html;

  floatBtn.classList.add('active');
  floatCount.style.display = 'inline-block';
  floatCount.textContent = totalQty + (totalQty === 1 ? ' item' : ' items');
  floatLabel.textContent = 'Ver pedido';
  floatTotal.textContent = '$' + total.toLocaleString('es-CL');
}

function handleFloatBtn() {
  if (!document.getElementById('float-btn').classList.contains('active')) return;
  abrirModal();
}

function abrirModal() {
  renderSummary();
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-sheet').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('cat-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.cat-tab');
  if (!btn) return;
  const cat = btn.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.cat-group').forEach(g => g.classList.remove('visible'));
  document.getElementById('cat-' + cat).classList.add('visible');
});

function enviarPedido() {
  const nombre = document.getElementById('nombre').value.trim();
  const hora = document.getElementById('hora').value;
  const instruccion = document.getElementById('instruccion').value.trim();
  const keys = Object.keys(cart);
  if (!nombre) { alert('Por favor ingresa tu nombre'); return; }
  if (!keys.length) { alert('Agrega al menos un producto'); return; }
  let lineas = ['*NUEVO PEDIDO - Pare y Coma*', `*Cliente:* ${nombre}`, `*Retiro:* ${hora}`, ''];
  keys.forEach(id => {
    const p = allItems().find(x => x.id === id); if (!p) return;
    const item = cart[id];
    lineas.push(`- ${item.qty}x *${p.nombre}*  $${(p.precio * item.qty).toLocaleString('es-CL')}`);
    if (item.extras.length) lineas.push(`   + Agregar: ${item.extras.join(', ')}`);
    if (item.removes.length) lineas.push(`   - Sin: ${item.removes.join(', ')}`);
  });
  const total = keys.reduce((s, id) => { const p = allItems().find(x => x.id === id); return s + (p ? p.precio * cart[id].qty : 0); }, 0);
  lineas.push('', `*Total: $${total.toLocaleString('es-CL')}*`);
  if (instruccion) lineas.push(`*Nota:* ${instruccion}`);
  lineas.push('', '_Pedido enviado via wapi_');
  window.open(`https://wa.me/${WSP_LOCAL}?text=${encodeURIComponent(lineas.join('\n'))}`, '_blank');
  setTimeout(() => location.reload(), 500);
}

buildMenus();
renderCards();
</script>
</body>
